name: Update DT State

on:
  schedule:
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dt-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python dt_state_updater.py
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add season_state.json team_state.json stats_state.json content_state.json
          git diff --cached --quiet && echo "No state changes to commit" || git commit -m "Update DT state"
          git diff --cached --quiet && exit 0
          git pull --rebase origin main
          git push

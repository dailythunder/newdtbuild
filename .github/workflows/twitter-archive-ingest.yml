name: Twitter Archive Ingest

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run Twitter archive ingest
        run: python archive_ingest_tweets.py

      - name: Commit generated archive changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add archive/tweets archive_state.json

          if git diff --cached --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi

          git commit -m "Ingest Twitter archive"
          git pull --rebase --autostash origin main
          git push

name: DT Podcast

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dt-podcast
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python dt_podcast.py
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}

      - name: Commit podcast state changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git status --short

          git add content_state.json season_state.json team_state.json stats_state.json

          if git diff --cached --quiet; then
            echo "No podcast state changes to commit"
            exit 0
          fi

          git commit -m "Update podcast state"
          git pull --rebase --autostash origin main
          git push

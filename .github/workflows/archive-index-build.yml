name: Archive Index Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Build archive indexes
        run: python archive_index_builder.py

      - name: Commit generated index changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add archive/index archive_state.json

          if git diff --cached --quiet; then
            echo "No archive index changes to commit"
            exit 0
          fi

          git commit -m "Build archive indexes"
          git pull --rebase --autostash origin main
          git push

name: DT Pregame

on:
  schedule:
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:
    inputs:
      target_game_id:
        description: "Optional game_id to target"
        required: false
        type: string
      force_demo:
        description: "Bypass normal time gating"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: dt-pregame
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python dt_pregame.py
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
          DT_TARGET_GAME_ID: ${{ inputs.target_game_id }}
          DT_FORCE_DEMO: ${{ inputs.force_demo }}
      - name: Commit pregame state changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add content_state.json season_state.json team_state.json stats_state.json

          if git diff --cached --quiet; then
            echo "No pregame state changes to commit"
            exit 0
          fi

          git commit -m "Update pregame state"
          git pull --rebase --autostash origin main
          git push

name: DT Scoreboard

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dt-scoreboard
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python dt_scoreboard.py
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add content_state.json season_state.json
          git diff --cached --quiet && echo "No scoreboard state changes to commit" || git commit -m "Update scoreboard state"
          git pull --rebase origin main
          git push

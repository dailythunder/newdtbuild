name: Yearbook Source Map

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Build yearbook source map
        run: python yearbook_source_map_builder.py

      - name: Build puzzle source inventory
        run: python puzzle_source_inventory.py

      - name: Commit generated map/inventory changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add yearbook/source_map.json yearbook/source_map.md puzzle/source_inventory.csv puzzle/source_inventory.json archive_state.json

          if git diff --cached --quiet; then
            echo "No yearbook/puzzle changes to commit"
            exit 0
          fi

          git commit -m "Build yearbook source map and puzzle source inventory"
          git pull --rebase --autostash origin main
          git push
